name: procesador-boletines-expediente

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  DOCKER_CONTAINER_NAME: ${{ vars.DOCKER_CONTAINER_NAME }}
  SQS_URL: ${{ vars.SQS_URL }}
  DYNAMO_TABLE: ${{ vars.DYNAMO_TABLE }}
  SNS_TOPIC_ARN: ${{ vars.SNS_TOPIC_ARN }}
  MOSTRADOR_BASE_URL: ${{ vars.MOSTRADOR_BASE_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}"
          LATEST_URI="${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest"
          docker build -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy on EC2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION
          script: |
            set -e
            REGISTRY="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
            IMAGE_URI="$REGISTRY/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}"
            aws ecr get-login-password --region "${{ vars.AWS_REGION }}" | docker login --username AWS --password-stdin "$REGISTRY"
            docker pull "$IMAGE_URI"
            docker stop "${{ vars.DOCKER_CONTAINER_NAME }}" || true
            docker rm "${{ vars.DOCKER_CONTAINER_NAME }}" || true
            docker run -d --restart unless-stopped --name "${{ vars.DOCKER_CONTAINER_NAME }}" \
              -e AWS_REGION="${{ vars.AWS_REGION }}" \
              -e SQS_URL="${{ vars.SQS_URL }}" \
              -e DYNAMO_TABLE="${{ vars.DYNAMO_TABLE }}" \
              -e SNS_TOPIC_ARN="${{ vars.SNS_TOPIC_ARN }}" \
              -e MOSTRADOR_BASE_URL="${{ vars.MOSTRADOR_BASE_URL }}" \
              "$IMAGE_URI"